# Ask Sylabus AGH — self-hosted, w 100% lokalnie.
#
# Uruchomienie:
#   cp .env.example .env
#   docker compose up --build
#   # ściągnij modele czatu przez Ollama (jednorazowo):
#   docker compose exec ollama ollama pull gemma4:26b
#   # TEI pobiera model embeddingów (sdadas/mmlw ~1.3 GB) automatycznie przy starcie.
#   # Żeby używać Ollamy do embeddingów zamiast TEI — odkomentuj EMBED_* w .env
#   # i usuń serwis tei z depends_on w app.
#   # otwórz http://localhost:8080
#
# Cztery usługi: postgres (baza + pgvector), ollama (czat LLM), tei (embeddingi), app.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sylabus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sylabus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sylabus}
      POSTGRES_DB: ${POSTGRES_DB:-sylabus}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sylabus} -d ${POSTGRES_DB:-sylabus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: sylabus-ollama
    restart: unless-stopped
    environment:
      OLLAMA_CONTEXT_LENGTH: 16384
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Jeśli masz GPU NVIDIA — odkomentuj poniższe (i zainstaluj nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: sylabus-tei
    restart: unless-stopped
    command: --model-id sdadas/mmlw-retrieval-roberta-large-v2 --port 80
    ports:
      - "8082:80"
    volumes:
      - tei-data:/data
    # GPU - TYLKO RTX 40xx - dla innych patrz dokumentacja na GitHub
    # image: ghcr.io/huggingface/text-embeddings-inference:89-1.9
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build:
      context: .
    image: sylabus-app:latest
    container_name: sylabus-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      tei:
        condition: service_started
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sylabus}:${POSTGRES_PASSWORD:-sylabus}@postgres:5432/${POSTGRES_DB:-sylabus}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      CHAT_MODEL: ${CHAT_MODEL:-gemma4:26b}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://tei:80/v1}
      EMBED_API_KEY: ${EMBED_API_KEY:-tei}
      EMBED_MODEL: ${EMBED_MODEL:-sdadas/mmlw-retrieval-roberta-large-v2}
      TOP_K: ${TOP_K:-15}
      PDF_STORAGE_DIR: /data/pdfs
      PORT: "8080"
      NODE_ENV: production
    volumes:
      - ./data/pdfs:/data/pdfs

volumes:
  pg-data:
  ollama-data:
  tei-data:
